spring:
  # import the env.yaml file if it exists for local development
  config:
    import: optional:file:./env.yaml

  autoconfigure:
    # Custom Petstore OAuth2 wiring (PetstoreOAuth2Config) allows empty client-id in yaml without startup failure
    exclude: org.springframework.boot.security.oauth2.client.autoconfigure.OAuth2ClientAutoConfiguration

  # application name
  application:
    name: company-registration-api

  # datasource configuration
  datasource:
    url: ${app.db.url:jdbc:h2:mem:companies}
    driver-class-name: ${app.db.driver-class-name:org.h2.Driver}
    username: ${app.db.username:sa}
    password: ${app.db.password:}
    hikari:
      pool-name: company-registration-pool
      # Concurrent DB users: HTTP threads + registration workers (AsyncConfig max 8)
      maximum-pool-size: 15
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      # Rotate connections before cloud DB/proxy idle limits (Neon, etc.)
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
  # ssl configuration for the outbound webclient
  # if mtls is enabled, we need to configure the keystore and truststore for the outbound webclient
  ssl:
    bundle:
      jks:
        client-mtls:
          truststore:
            location: classpath:ssl/truststore.p12
            password: changeit
            type: PKCS12
  # Global outbound HTTP client settings (RestClient + WebClient): timeouts, redirects, SSL bundle
  http:
    clients:
      connect-timeout: 10s
      read-timeout: 30s
      redirects: follow-when-possible
      ssl:
        bundle: client-mtls
  # OAuth2 client_credentials for Petstore outbound WebClient (see README; secrets via env vars).
  # Spring splits OAuth2 client config into two maps that link by name:
  #   registration.<id>  — *this app's* OAuth client (who we are, how we authenticate)
  #   provider.<name>    — authorization server endpoints (where to get tokens)
  # registration.petstore.provider: petstore points at provider.petstore below.
  # For client_credentials, only provider.token-uri is used (no authorization-uri / redirect-uri).

  # petstore does not need oauth2 authorization. This is for demo purposes only.
  # The provider is oauth.com/playground
  # User Account: 
  #   login: light-okapi@example.com
  #   password: Ugly-Crayfish-50
  #   client_id: EtQw7msbvpVXtzOp5SstQxAF
  #   client_secret: lYec0aWCJ1lbu503_w1IhTxTcXDh3PWOyLJksS0KRsdSVLgb
  security:
    oauth2:
      client:
        # Per-client settings: registration id "petstore" matches PetstoreOAuth2Config / interceptor.
        registration:
          petstore:
            # Lookup key into provider.* — must match a provider id defined below.
            provider: petstore
            client-id: ${PETSTORE_OAUTH_CLIENT_ID:EtQw7msbvpVXtzOp5SstQxAF}
            client-secret: ${PETSTORE_OAUTH_CLIENT_SECRET:lYec0aWCJ1lbu503_w1IhTxTcXDh3PWOyLJksS0KRsdSVLgb}
            authorization-grant-type: client_credentials
            scope:
              - read:pets
              - write:pets
        # Authorization-server endpoints for provider id "petstore" (referenced above).
        # Token POSTs use outboundRestClient (spring.http.clients.ssl.bundle), not petstoreWebClient —
        # Spring Security fetches tokens on its own HTTP client; headless/service apps need this for private CAs.
        provider:
          petstore:
            token-uri: ${PETSTORE_OAUTH_TOKEN_URI:}

# server configuration
server:
  port: 8443
  tomcat:
    # Platform thread pool
    threads:
      max: 50
      min-spare: 10
    # accept-count: app-level queue when all worker threads (above) are busy — TCP is
    # already accepted; requests wait here for a free thread to run handler code.
    accept-count: 100
    # max-connections: cap on open TCP connections Tomcat keeps (active + idle keep-alive);
    # beyond this, new clients wait in the OS TCP listen backlog or are refused.
    max-connections: 200
    # Client → OS TCP backlog → Tomcat accepts → accept-count queue → worker thread → your code
    #                 ↑ max-connections                          ↑ threads.max

  # ssl configuration for the server itself
  ssl:
    enabled: true
    key-store: ${app.ssl.keystore-path:classpath:ssl/keystore.p12}
    key-store-password: ${app.ssl.keystore-password:changeit}
    key-store-type: PKCS12
    key-alias: company-registration-api

# application configuration
app:
  # vector search configuration
  vector-search:
    delay-ms: 1000
  # admin configuration
  admin:
    # shared secret for X-Admin-Key on /api/admin/* (see README Authentication)
    api-key: ${APP_ADMIN_API_KEY:}
  rate-limit:
    enabled: true
    client-requests-per-minute: 60
    admin-requests-per-minute: 10
  petstore:
    base-url: https://petstore3.swagger.io/api/v3
    api-key: ${PETSTORE_API_KEY:}

# Actuator / Micrometer
# - /actuator/metrics     — debug (timers: COUNT, TOTAL_TIME, MAX only)
# - /actuator/prometheus  — service.method p50/p95/p99 (see ServiceLoggingAspect)
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
