spring:
  # import the env.yaml file if it exists for local development
  config:
    import: optional:file:./env.yaml

  # application name
  application:
    name: company-registration-api

  # datasource configuration
  datasource:
    url: ${app.db.url:jdbc:h2:mem:companies}
    driver-class-name: ${app.db.driver-class-name:org.h2.Driver}
    username: ${app.db.username:sa}
    password: ${app.db.password:}
    hikari:
      pool-name: company-registration-pool
      # Concurrent DB users: HTTP threads + registration workers (AsyncConfig max 8)
      maximum-pool-size: 15
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      # Rotate connections before cloud DB/proxy idle limits (Neon, etc.)
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

# server configuration
server:
  port: 8443
  tomcat:
    # Platform thread pool
    threads:
      max: 50
      min-spare: 10
    # Socket backlog when all connections are busy (still applies with virtual threads)
    accept-count: 100
    max-connections: 200
  # ssl configuration
  ssl:
    enabled: true
    key-store: ${app.ssl.keystore-path:classpath:ssl/keystore.p12}
    key-store-password: ${app.ssl.keystore-password:changeit}
    key-store-type: PKCS12
    key-alias: company-registration-api

# application configuration
app:
  # vector search configuration
  vector-search:
    delay-ms: 1000
  # admin configuration
  admin:
    # shared secret for X-Admin-Key on /api/admin/* (see README Authentication)
    api-key: ${APP_ADMIN_API_KEY:}
  rate-limit:
    enabled: true
    client-requests-per-minute: 60
    admin-requests-per-minute: 10

# Actuator / Micrometer
# - /actuator/metrics     — debug (timers: COUNT, TOTAL_TIME, MAX only)
# - /actuator/prometheus  — service.method p50/p95/p99 (see ServiceLoggingAspect)
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
